# ----------------------------------------------------------------------------
# oihana/php-arango — example configuration
#
# Copy this file to `configs/config.toml` and adjust the values for your
# local ArangoDB instance. Two sections are consumed by the library's
# `bin/console.php` runner: [app] for the dump/restore directory and
# [arango] for the database connection.
# ----------------------------------------------------------------------------

# ----------------------------------------------------------------------------
# [app] — runtime paths for the bundled `command:arangodb` (dump/restore).
#
# `dumps` is the directory where dump archives are written and read.
#
#   - Absolute path  ("/var/data/arango/dumps")  → used as-is.
#   - Relative path  ("dumps", "var/dumps")      → resolved against the
#                                                  library root (the parent
#                                                  of `configs/`).
#   - Key absent / commented                     → defaults to
#                                                  "<library-root>/dumps".
#
# When integrating the library inside your own application, wire your own
# DI definition for `ArangoCommandParam::DIRECTORY` and ignore this key —
# see wiki/{fr,en}/commands.md for the host-project pattern.
# ----------------------------------------------------------------------------

[app]
# dumps = "/var/data/arango/dumps"

[arango]
database   = "your_database"
endpoint   = "tcp://127.0.0.1:8529"
user       = "root"
password   = ""
# Default passphrase used by `command:arangodb dump --encrypt` and
# `restore` when the archive is encrypted. Override on the CLI with
# `--passphrase <value>` (or `-p`). Leave empty to prompt interactively.
passphrase = ""
batchSize  = 20000
connection = "Keep-Alive"
create     = true
debug      = false
# `encrypt = true` turns on archive encryption by default for `dump`.
# Override per-run with `--encrypt` (force on) or `--encrypt=0` (off).
encrypt    = false
lazy       = true
reconnect  = true
timeout    = 6
type       = "Basic"

# ----------------------------------------------------------------------------
# [arango.dump] / [arango.restore] — optional default options for the
# `command:arangodb dump` and `restore` actions.
#
# Keys are the option property names of ArangoDumpOptions / ArangoRestoreOptions
# (camelCase). They become persistent defaults; the CLI always overrides them
# (precedence: binary default → these sections → CLI flag). Unknown keys are
# ignored. See wiki/{fr,en}/commands/arangodb.md → "Configuring option defaults".
# ----------------------------------------------------------------------------

# [arango.dump]
# threads                  = 4
# overwrite                = true
# includeSystemCollections = false   # true to pull _analyzers, _graphs, …
# complete                 = true     # surgical complete backup: every user
#                                     # collection + _analyzers + _graphs only
#                                     # (same as the --complete flag)
# maskings                 = "/etc/oihana/maskings.json"  # native arangodump
#                                     # maskings file — Enterprise edition only
#                                     # (escape hatch; takes over the PHP engine)

# Convenient masking applied to ANY dump by the built-in PHP engine (works on every
# ArangoDB edition, Community included). Anonymizes at dump time — the archive itself
# is clean. Dump-only. Keys: "<collection>.<path>" = "<masker>"
# (email/phone/creditCard/zip/random/randomString/xifyFront/datetime/integer/decimal)
# or an inline table for parameters; "<collection>" = "masked" sets the mode (only
# `masked` is supported — exclude collections via --collection / the profile). The
# system attributes _key/_id/_rev/_from/_to are never masked.
# See wiki/{fr,en}/commands/arangodb.md → "Masking".
# [arango.dump.masking]
# "users.email"          = "email"
# "users.phone"          = "phone"
# "users.card"           = { type = "xifyFront", unmaskedLength = 4 }
# "users.address.city"   = "random"

# Archive rotation — OPT-IN. Without a policy here (and without --prune) nothing is
# ever deleted. The "bucket" is the archive suffix signature
# ({database}[-partial][-{label}]); archives of the same nature rotate together.
# Safety: at least one archive is always kept per bucket, the just-created archive is
# never pruned, and --dry-run lists without deleting.
# See wiki/{fr,en}/commands/arangodb.md → "Archive rotation".
# [arango.dump.retention]
# keep      = 7            # keep the N most recent per bucket
# max_age   = "P30D"       # ISO 8601 duration: drop beyond this age (P30D / P6M / P1Y)
#                          # with both keep + max_age, delete only if beyond N AND older
# max_total = "5G"         # global disk cap (size) or a byte count, applied last
# auto      = true         # prune automatically after each successful dump (default: off)
#
# [arango.dump.retention.buckets]   # per-bucket overrides (key = suffix signature)
# "mydb-partial-pre-migration" = 3

# [arango.restore]
# threads = 4
# # Safety guard-rail: the restore REFUSES to overwrite these collections unless
# # --force is passed (a deployment policy — never an arangorestore option). Keep
# # your authentication collections here so a stray full restore cannot clobber
# # them. See wiki/{fr,en}/commands/arangodb.md → "Restore guard-rails".
# protected = ["users", "sessions", "permissions"]

# ----------------------------------------------------------------------------
# [arango.profiles.<name>] — reusable named dump/restore selections.
#
# A profile names WHAT to extract (and, optionally, the dump SOURCE). Pass it
# with `--profile <name>`, or point to a standalone .toml file with
# `--profile path/to/file.toml`. The restore borrows the selection only — never
# the connection (it always writes to the local target). See
# wiki/{fr,en}/commands/arangodb.md → "Profiles".
# ----------------------------------------------------------------------------

# [arango.profiles.test-local]
# collections = ["thesaurus", "products", "clients"]
# edges       = ["product_thesaurus"]
# exclude     = ["_users", "sessions"]
# # optional SOURCE connection (used by `dump` only):
# endpoint    = "tcp://staging.internal:8529"
# database    = "app_staging"
# user        = "readonly"
# password    = ""
# # optional masking compiled to a native file (dump-only, Enterprise Edition):
# [arango.profiles.test-local.masking]
# "clients.email" = "email"
# "clients.phone" = "phone"
